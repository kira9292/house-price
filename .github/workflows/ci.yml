name: CI — Tests & Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  tests:
    name: Tests unitaires (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install dill loguru numpy pandas scikit-learn xgboost lightgbm catboost \
                      optuna optuna-integration mlflow ppscore pendulum pyarrow pytest

      - name: Exécution des tests unitaires
        run: pytest tests/ -v --tb=short

  dvc-pipeline:
    name: DVC Pipeline (train)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install dill loguru numpy pandas scikit-learn xgboost lightgbm catboost \
                      optuna optuna-integration mlflow ppscore pendulum pyarrow dvc

      - name: Initialisation DVC
        run: dvc init --no-scm 2>/dev/null || true

      - name: Exécution du pipeline d'entraînement
        run: python src/train_pipeline.py

      - name: Affichage des métriques
        run: |
          if [ -f metrics.json ]; then
            echo "=== Métriques du modèle ==="
            cat metrics.json
          fi

      - name: Upload métriques
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-metrics
          path: metrics.json
